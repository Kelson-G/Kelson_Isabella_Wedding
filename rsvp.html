    <main>
      <section class="page-header">
        <h1>RSVP</h1>
        <p>Please let us know if you&rsquo;ll be joining us.</p>
      </section>

      <!-- RSVP stats — populated by forms.js when APPS_SCRIPT_URL is set in forms.js -->
      <div id="rsvp-stats" class="rsvp-stats" hidden>
        <p class="rsvp-stats__total">Expected guests: <strong id="rsvp-count-total"></strong></p>
        <div class="rsvp-stats__breakdown">
          <div class="rsvp-stats__venue">
            <span class="rsvp-stats__label">Washington</span>
            <strong id="rsvp-count-wa"></strong>
          </div>
          <div class="rsvp-stats__venue">
            <span class="rsvp-stats__label">Idaho</span>
            <strong id="rsvp-count-id"></strong>
          </div>
        </div>
        <p class="rsvp-stats__sub"><span id="rsvp-count-forms"></span> received &bull; maybes counted at 25%</p>
      </div>

      <!-- Google Form embed — set GOOGLE_FORM_URL in js/forms.js -->
      <section class="form-section">
        <iframe
          id="rsvp-form"
          src=""
          frameborder="0"
          marginheight="0"
          marginwidth="0"
          title="RSVP Form"
          loading="lazy">
          Loading form&hellip;
        </iframe>
      </section>
    </main>
